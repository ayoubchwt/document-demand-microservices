<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eureka Explainer</title>
  <style>
    body {
      font-family: sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      margin: 0;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e0e0e0; }
      .btn { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
      .btn:hover { background: #333; }
    }
    .stepper { padding: 1rem 0; max-width: 720px; margin: auto; }
    .stage-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; transition: background .3s; cursor: pointer; }
    .dot.active { background: #2563eb; }
    .stage-title { font-size: 18px; font-weight: 500; text-align: center; margin-bottom: 8px; }
    .stage-desc { font-size: 14px; color: #555; text-align: center; margin-bottom: 20px; line-height: 1.6; max-width: 520px; margin-left: auto; margin-right: auto; }
    @media (prefers-color-scheme: dark) { .stage-desc { color: #aaa; } }
    .nav { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
    .btn { padding: 8px 24px; border-radius: 8px; border: 1px solid #ccc; background: #f5f5f5; color: #1a1a1a; font-size: 14px; cursor: pointer; }
    .btn:hover { background: #e5e5e5; }
    h1 { text-align: center; font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 32px; }
  </style>
</head>
<body>
  <h1>How Eureka works</h1>
  <p class="subtitle">Service discovery in Spring Cloud — click through each stage</p>

  <div class="stepper">
    <div class="stage-dots" id="dots"></div>
    <div class="stage-title" id="title"></div>
    <div class="stage-desc" id="desc"></div>
    <svg width="100%" viewBox="0 0 680 280" id="diagram"></svg>
    <div class="nav">
      <button class="btn" onclick="prev()">← Back</button>
      <button class="btn" onclick="next()">Next →</button>
    </div>
  </div>

  <script>
    const stages = [
      {
        title: "The problem — hardcoded addresses",
        desc: "Service A wants to talk to Payment Service. It hardcodes the address. But what if Payment moves to a different port or crashes? Everything breaks.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="60" y="108" width="160" height="44" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
            <text x="140" y="130" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Orders service</text>
          </g>
          <line x1="220" y1="130" x2="330" y2="130" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="6 3"/>
          <text x="275" y="118" text-anchor="middle" font-size="11" fill="#A32D2D">hardcoded!</text>
          <text x="275" y="148" text-anchor="middle" font-size="11" fill="#A32D2D">192.168.1.5:8083</text>
          <g>
            <rect x="330" y="108" width="160" height="44" rx="8" stroke-width="0.5" fill="#FCEBEB" stroke="#A32D2D"/>
            <text x="410" y="130" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F">Payment service</text>
          </g>
          <text x="410" y="185" text-anchor="middle" font-size="12" fill="#E24B4A">crashes or moves port...</text>
          <line x1="410" y1="152" x2="410" y2="175" stroke="#E24B4A" stroke-width="1" marker-end="url(#arr)"/>
          <g>
            <rect x="330" y="190" width="160" height="40" rx="8" stroke-width="0.5" fill="#FCEBEB" stroke="#E24B4A"/>
            <text x="410" y="210" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#791F1F">Connection refused!</text>
          </g>
        `
      },
      {
        title: "Step 1 — Eureka server starts",
        desc: "A dedicated Eureka Server starts up. It's just an empty phone book for now. Every microservice will register itself here.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="240" y="80" width="200" height="100" rx="12" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="340" y="118" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Eureka server</text>
            <text x="340" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">port 8761</text>
            <text x="340" y="158" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7F77DD">(registry is empty)</text>
          </g>
          <text x="340" y="220" text-anchor="middle" font-size="13" fill="#888">Waiting for services to register...</text>
        `
      },
      {
        title: "Step 2 — Services register on startup",
        desc: "When each microservice starts, the Eureka Client inside it automatically sends a registration request to the server: 'I am Payment Service, I live at port 8083'.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="240" y="20" width="200" height="110" rx="12" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="340" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Eureka server</text>
            <text x="340" y="72" text-anchor="middle" font-size="11" fill="#534AB7">PAYMENT → :8083</text>
            <text x="340" y="90" text-anchor="middle" font-size="11" fill="#534AB7">ORDERS  → :8081</text>
            <text x="340" y="108" text-anchor="middle" font-size="11" fill="#534AB7">USERS   → :8082</text>
          </g>
          <g>
            <rect x="30" y="160" width="140" height="44" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
            <text x="100" y="182" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Payment :8083</text>
          </g>
          <g>
            <rect x="270" y="160" width="140" height="44" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
            <text x="340" y="182" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Orders :8081</text>
          </g>
          <g>
            <rect x="510" y="160" width="140" height="44" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
            <text x="580" y="182" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Users :8082</text>
          </g>
          <line x1="100" y1="160" x2="280" y2="130" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
          <line x1="340" y1="160" x2="340" y2="130" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
          <line x1="580" y1="160" x2="400" y2="130" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
          <text x="160" y="152" font-size="11" fill="#0F6E56">register</text>
          <text x="348" y="152" font-size="11" fill="#0F6E56">register</text>
          <text x="470" y="152" font-size="11" fill="#0F6E56">register</text>
        `
      },
      {
        title: "Step 3 — Heartbeat keeps registry fresh",
        desc: "Every 30 seconds, each service sends a heartbeat to Eureka: 'I'm still alive!'. If Eureka stops receiving heartbeats from a service, it removes it from the registry automatically.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="240" y="20" width="200" height="80" rx="12" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="340" y="55" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Eureka server</text>
            <text x="340" y="78" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">watching heartbeats...</text>
          </g>
          <g>
            <rect x="30" y="150" width="140" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="100" y="172" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment</text>
          </g>
          <g>
            <rect x="510" y="150" width="140" height="44" rx="8" stroke-width="0.5" fill="#FCEBEB" stroke="#A32D2D"/>
            <text x="580" y="165" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#791F1F">Orders</text>
            <text x="580" y="183" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">crashed!</text>
          </g>
          <line x1="100" y1="150" x2="270" y2="100" stroke="#639922" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr)"/>
          <text x="140" y="118" font-size="11" fill="#3B6D11">still alive!</text>
          <line x1="580" y1="150" x2="430" y2="100" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 4"/>
          <text x="490" y="118" font-size="11" fill="#A32D2D">no heartbeat...</text>
          <text x="580" y="220" text-anchor="middle" font-size="12" fill="#E24B4A">removed from registry</text>
          <line x1="580" y1="194" x2="580" y2="213" stroke="#E24B4A" stroke-width="1" marker-end="url(#arr)"/>
        `
      },
      {
        title: "Step 4 — Service lookup",
        desc: "When Orders service needs to call Payment, it asks Eureka: 'Where is PAYMENT-SERVICE?' Eureka returns the address. Orders calls Payment directly — no hardcoding needed.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="240" y="20" width="200" height="80" rx="12" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Eureka server</text>
            <text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">PAYMENT → localhost:8083</text>
          </g>
          <g>
            <rect x="30" y="150" width="140" height="44" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
            <text x="100" y="172" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#0C447C">Orders service</text>
          </g>
          <g>
            <rect x="510" y="150" width="140" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="580" y="172" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment service</text>
          </g>
          <path d="M170 155 L340 100" fill="none" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="5 3"/>
          <text x="210" y="118" font-size="11" fill="#534AB7">where is Payment?</text>
          <path d="M340 100 L170 160" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="5 3"/>
          <text x="195" y="145" font-size="11" fill="#0F6E56">localhost:8083</text>
          <line x1="170" y1="172" x2="510" y2="172" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
          <text x="340" y="165" text-anchor="middle" font-size="11" fill="#185FA5">direct call</text>
        `
      }
    ];

    let current = 0;

    function render() {
      const s = stages[current];
      document.getElementById('title').textContent = s.title;
      document.getElementById('desc').textContent = s.desc;
      document.getElementById('diagram').innerHTML = s.svg;
      const dots = document.getElementById('dots');
      dots.innerHTML = stages.map((_, i) =>
        `<div class="dot ${i === current ? 'active' : ''}" onclick="goto(${i})"></div>`
      ).join('');
    }

    function next() { current = (current + 1) % stages.length; render(); }
    function prev() { current = (current - 1 + stages.length) % stages.length; render(); }
    function goto(i) { current = i; render(); }

    render();
  </script>
</body>
</html>
