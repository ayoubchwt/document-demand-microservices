<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Load Balancing & Eureka</title>
  <style>
    body {
      font-family: sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      margin: 0;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e0e0e0; }
      .btn { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
      .btn:hover { background: #333; }
    }
    .stepper { padding: 1rem 0; max-width: 720px; margin: auto; }
    .stage-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; transition: background .3s; cursor: pointer; }
    .dot.active { background: #2563eb; }
    .stage-title { font-size: 18px; font-weight: 500; text-align: center; margin-bottom: 8px; }
    .stage-desc { font-size: 14px; color: #555; text-align: center; margin-bottom: 20px; line-height: 1.6; max-width: 520px; margin-left: auto; margin-right: auto; }
    @media (prefers-color-scheme: dark) { .stage-desc { color: #aaa; } }
    .nav { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
    .btn { padding: 8px 24px; border-radius: 8px; border: 1px solid #ccc; background: #f5f5f5; color: #1a1a1a; font-size: 14px; cursor: pointer; }
    .btn:hover { background: #e5e5e5; }
    h1 { text-align: center; font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 32px; }
  </style>
</head>
<body>
  <h1>Load balancing with Eureka</h1>
  <p class="subtitle">Multiple instances, automatic routing, zero downtime — click through each stage</p>

  <div class="stepper">
    <div class="stage-dots" id="dots"></div>
    <div class="stage-title" id="title"></div>
    <div class="stage-desc" id="desc"></div>
    <svg width="100%" viewBox="0 0 680 280" id="diagram"></svg>
    <div class="nav">
      <button class="btn" onclick="prev()">← Back</button>
      <button class="btn" onclick="next()">Next →</button>
    </div>
  </div>

  <script>
    const stages = [
      {
        title: "3 instances of Payment register in Eureka",
        desc: "You start 3 copies of Payment service. Each registers itself under the same name PAYMENT-SERVICE but on a different port. Eureka stores all 3.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="220" y="16" width="240" height="100" rx="12" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Eureka server</text>
            <text x="340" y="66" text-anchor="middle" font-size="11" fill="#534AB7">PAYMENT-SERVICE → :8083</text>
            <text x="340" y="82" text-anchor="middle" font-size="11" fill="#534AB7">PAYMENT-SERVICE → :8084</text>
            <text x="340" y="98" text-anchor="middle" font-size="11" fill="#534AB7">PAYMENT-SERVICE → :8085</text>
          </g>
          <g>
            <rect x="30" y="180" width="140" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="100" y="198" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment</text>
            <text x="100" y="214" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">instance 1 :8083</text>
          </g>
          <g>
            <rect x="270" y="180" width="140" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="340" y="198" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment</text>
            <text x="340" y="214" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">instance 2 :8084</text>
          </g>
          <g>
            <rect x="510" y="180" width="140" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="580" y="198" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment</text>
            <text x="580" y="214" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">instance 3 :8085</text>
          </g>
          <line x1="100" y1="180" x2="268" y2="116" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
          <line x1="340" y1="180" x2="340" y2="116" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
          <line x1="580" y1="180" x2="412" y2="116" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
        `
      },
      {
        title: "Load balancer picks which instance to call",
        desc: "Spring Cloud LoadBalancer gets all 3 instances from Eureka and picks one using Round Robin — request 1 goes to :8083, request 2 to :8084, request 3 to :8085, then back to :8083.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="10" y="110" width="160" height="56" rx="8" stroke-width="0.5" fill="#FAEEDA" stroke="#854F0B"/>
            <text x="90" y="132" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">Load balancer</text>
            <text x="90" y="150" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">round robin</text>
          </g>
          <g>
            <rect x="490" y="40" width="160" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="570" y="56" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment :8083</text>
            <text x="570" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">req 1, req 4...</text>
          </g>
          <g>
            <rect x="490" y="118" width="160" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="570" y="134" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment :8084</text>
            <text x="570" y="150" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">req 2, req 5...</text>
          </g>
          <g>
            <rect x="490" y="196" width="160" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="570" y="212" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment :8085</text>
            <text x="570" y="228" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">req 3, req 6...</text>
          </g>
          <line x1="170" y1="128" x2="488" y2="62" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="170" y1="138" x2="488" y2="140" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="170" y1="148" x2="488" y2="218" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
          <text x="330" y="60" text-anchor="middle" font-size="11" fill="#854F0B">req 1</text>
          <text x="330" y="136" text-anchor="middle" font-size="11" fill="#854F0B">req 2</text>
          <text x="320" y="200" text-anchor="middle" font-size="11" fill="#854F0B">req 3</text>
        `
      },
      {
        title: "One instance crashes — no problem",
        desc: "Instance 2 on :8084 crashes. Its heartbeat stops. Eureka removes it from the registry. The load balancer now only sees 2 instances and distributes between them. Zero code changes needed.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="10" y="110" width="160" height="56" rx="8" stroke-width="0.5" fill="#FAEEDA" stroke="#854F0B"/>
            <text x="90" y="132" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806">Load balancer</text>
            <text x="90" y="150" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">2 instances left</text>
          </g>
          <g>
            <rect x="490" y="40" width="160" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="570" y="62" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment :8083</text>
          </g>
          <g>
            <rect x="490" y="118" width="160" height="44" rx="8" stroke-width="0.5" fill="#FCEBEB" stroke="#A32D2D"/>
            <text x="570" y="134" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#791F1F">Payment :8084</text>
            <text x="570" y="150" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">crashed!</text>
          </g>
          <g>
            <rect x="490" y="196" width="160" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="570" y="218" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A">Payment :8085</text>
          </g>
          <line x1="170" y1="125" x2="488" y2="62" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="170" y1="148" x2="488" y2="218" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="490" y1="140" x2="300" y2="140" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3"/>
          <text x="385" y="132" text-anchor="middle" font-size="11" fill="#A32D2D">removed from registry</text>
          <text x="340" y="260" text-anchor="middle" font-size="12" fill="#888">Traffic automatically rerouted. Zero downtime.</text>
        `
      },
      {
        title: "Scale up instantly — just start more instances",
        desc: "Traffic is growing. You start 2 more Payment instances. They register themselves automatically. Eureka now has 4 instances. Load balancer immediately starts using them. No config changes anywhere.",
        svg: `
          <defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
          <g>
            <rect x="220" y="10" width="240" height="120" rx="12" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="340" y="34" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Eureka server</text>
            <text x="340" y="56" text-anchor="middle" font-size="11" fill="#534AB7">PAYMENT-SERVICE → :8083</text>
            <text x="340" y="72" text-anchor="middle" font-size="11" fill="#534AB7">PAYMENT-SERVICE → :8085</text>
            <text x="340" y="88" text-anchor="middle" font-size="11" fill="#7F77DD">PAYMENT-SERVICE → :8086 (new!)</text>
            <text x="340" y="104" text-anchor="middle" font-size="11" fill="#7F77DD">PAYMENT-SERVICE → :8087 (new!)</text>
          </g>
          <g>
            <rect x="30" y="185" width="120" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="90" y="207" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#27500A">:8083</text>
          </g>
          <g>
            <rect x="175" y="185" width="120" height="44" rx="8" stroke-width="0.5" fill="#EAF3DE" stroke="#3B6D11"/>
            <text x="235" y="207" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#27500A">:8085</text>
          </g>
          <g>
            <rect x="320" y="185" width="140" height="44" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="390" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">:8086</text>
            <text x="390" y="216" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7F77DD">just started!</text>
          </g>
          <g>
            <rect x="490" y="185" width="140" height="44" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
            <text x="560" y="200" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">:8087</text>
            <text x="560" y="216" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#7F77DD">just started!</text>
          </g>
          <line x1="90" y1="185" x2="278" y2="130" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
          <line x1="235" y1="185" x2="300" y2="130" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
          <line x1="390" y1="185" x2="370" y2="130" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>
          <line x1="560" y1="185" x2="420" y2="130" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>
        `
      }
    ];

    let current = 0;

    function render() {
      const s = stages[current];
      document.getElementById('title').textContent = s.title;
      document.getElementById('desc').textContent = s.desc;
      document.getElementById('diagram').innerHTML = s.svg;
      const dots = document.getElementById('dots');
      dots.innerHTML = stages.map((_, i) =>
        `<div class="dot ${i === current ? 'active' : ''}" onclick="goto(${i})"></div>`
      ).join('');
    }

    function next() { current = (current + 1) % stages.length; render(); }
    function prev() { current = (current - 1 + stages.length) % stages.length; render(); }
    function goto(i) { current = i; render(); }

    render();
  </script>
</body>
</html>
