info:
  name: update demand status
  type: http
  seq: 10

http:
  method: PUT
  url: http://localhost:8082/demands/demandStatus
  body:
    type: json
    data: |-
      {
        "id" : 1,
        "municipalityId" : 1, 
        "status" : "APPROVED"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
