# name of microservice
spring.application.name=DEMAND-SERVICE
# port of microservice
server.port=8082

# Database (connecting and merging)
spring.datasource.url=jdbc:mysql://localhost:3306/DocumentDemand?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Logging (for dev)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
#logging.level.com.netflix.discovery=OFF
#logging.level.com.netflix.eureka=OFF
#logging.level.org.springframework.cloud.netflix=OFF

# eureka settings
# tells the service about eureka port so it can register itself
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# register service in eureka
eureka.client.register-with-eureka=true

# Disable Config Server (am using local config)
spring.cloud.config.enabled=false

# Cloudinary config
cloudinary.cloud-name=***REMOVED***
cloudinary.api-key=***REMOVED***
cloudinary.api-secret=***REMOVED***

server.forward-headers-strategy=framework
springdoc.api-docs.path=/demands/v3/api-docs

