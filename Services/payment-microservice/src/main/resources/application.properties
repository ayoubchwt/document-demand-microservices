# name of microservice
spring.application.name=PAYMENT-SERVICE
# stripe configuration
stripe.key.secret=***REMOVED***
stripe.webhook.secret=***REMOVED***
# port of microservice
server.port=8083

# Database (connecting and merging) - not needed for now
# spring.datasource.url=jdbc:mysql://localhost:3306/payment?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=update

# Logging (for dev)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.netflix.discovery=OFF
logging.level.com.netflix.eureka=OFF
logging.level.org.springframework.cloud.netflix=OFF

# eureka settings
# tells the service about eureka port so it can register itself
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# register service in eureka
eureka.client.register-with-eureka=true

# Disable Config Server (am using local config)
spring.cloud.config.enabled=false


