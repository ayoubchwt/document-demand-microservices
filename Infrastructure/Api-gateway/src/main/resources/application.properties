# name of gateway
spring.application.name=API-GATEWAY
server.port=8087

# Eureka settings
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

# --- DEMAND SERVICE (Updated for 2026/Spring Boot 3.5) ---
spring.cloud.gateway.server.webflux.routes[0].id=DEMAND-SERVICE
spring.cloud.gateway.server.webflux.routes[0].uri=lb://DEMAND-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/demands/**

spring.cloud.gateway.server.webflux.routes[1].id=PAYMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/payment/**

# --- SWAGGER UI CONFIG ---
springdoc.swagger-ui.urls[0].name=Document Demand Service
springdoc.swagger-ui.urls[0].url=/demands/v3/api-docs

springdoc.swagger-ui.urls[1].name=Payment Service
springdoc.swagger-ui.urls[1].url=/payment/v3/api-docs