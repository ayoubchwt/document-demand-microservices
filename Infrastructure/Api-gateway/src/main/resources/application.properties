# name of gateway
spring.application.name=API-GATEWAY
# port of the gateway
server.port=8087
# eureka settings
# tells the service about eureka port so it can register itself
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# register service in eureka
eureka.client.register-with-eureka=true

# name of the route
spring.cloud.gateway.server.webmvc.routes[0].id=document-demand
# hardcoding the demand uri (static routing)
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8082
# match any request that starts with /demands/**
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/demands/**

spring.cloud.gateway.server.webmvc.routes[1].id=payment
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/payment/**
